<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi K3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 8px; min-height: 50px; }
        .msg { background: #e8f0fe; color: #1967d2; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Terminal Absensi</h2>
        <div id="reader"></div>
        <div id="status">Menunggu Scan...</div>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE SCRIPT ANDA
        const api_url = "https://script.google.com/macros/s/AKfycbzMk-PL43AWbV7CFG5iqGCFHeWsZNS5U64h6HijdPjFJPHejZ4sGe9JAn1jDVTZwpifNQ/exec"; 

        function onScanSuccess(decodedText) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = "Memproses ID: " + decodedText;
            statusEl.className = "msg";

            // Mengirim data ke Google Sheets menggunakan JSONP (untuk menghindari CORS)
            const script = document.createElement('script');
            script.src = api_url + "?id=" + decodedText + "&callback=handleResponse";
            document.body.appendChild(script);
        }

        // Fungsi untuk menerima balasan dari Google
        window.handleResponse = function(response) {
            document.getElementById('status').innerHTML = response;
            // Scan ulang otomatis setelah 3 detik
            setTimeout(() => { document.getElementById('status').innerHTML = "Siap Memindai..."; }, 3000);
        };

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
