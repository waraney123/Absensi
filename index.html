<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner HSE</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        #status { margin-top: 15px; padding: 15px; border-radius: 10px; font-weight: bold; min-height: 40px; }
        .active { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Scanner QR Absensi</h2>
        <div id="reader"></div>
        <button id="start-btn" class="btn" onclick="start()">AKTIFKAN KAMERA</button>
        <div id="status">Siap Memindai...</div>
    </div>
    <script>
        const api_url = "https://script.google.com/macros/s/AKfycbzMk-PL43AWbV7CFG5iqGCFHeWsZNS5U64h6HijdPjFJPHejZ4sGe9JAn1jDVTZwpifNQ/exec"; 
        let html5QrCode;

        function start() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
        }

        function onScan(id) {
            html5QrCode.pause(true);
            document.getElementById('status').innerHTML = "Memproses ID: " + id;
            document.getElementById('status').className = "active";
            
            const script = document.createElement('script');
            script.src = api_url + "?id=" + encodeURIComponent(id) + "&callback=done";
            document.body.appendChild(script);
        }

        window.done = function(msg) {
            document.getElementById('status').innerHTML = msg;
            setTimeout(() => { 
                document.getElementById('status').innerHTML = "Siap Memindai..."; 
                document.getElementById('status').className = "";
                html5QrCode.resume(); 
            }, 3000);
        };
    </script>
</body>
</html><!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSE Scanner Turbo</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .btn { width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        #status { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; transition: 0.2s; }
        .success { background: #d4edda; color: #155724; border: 2px solid #155724; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#1a73e8">Scanner Absensi</h2>
        <div id="reader"></div>
        <button id="start-btn" class="btn" onclick="startScanner()">AKTIFKAN SCANNER</button>
        <div id="status">Siap Memindai...</div>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP GOOGLE ANDA
        const api_url = "https://script.google.com/macros/s/AKfycbzMk-PL43AWbV7CFG5iqGCFHeWsZNS5U64h6HijdPjFJPHejZ4sGe9JAn1jDVTZwpifNQ/exec"; 
        let html5QrCode;

        function startScanner() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
        }

        function onScan(id) {
            // FEEDBACK INSTAN (Turbo)
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = "✅ BERHASIL: " + id;
            statusEl.className = "success";
            
            if (navigator.vibrate) navigator.vibrate(100); // Getar HP
            html5QrCode.pause(true);

            // Kirim data di latar belakang
            const img = new Image();
            img.src = api_url + "?id=" + encodeURIComponent(id) + "&t=" + new Date().getTime();

            // Siap scan lagi dalam 1.5 detik
            setTimeout(() => {
                statusEl.innerHTML = "Siap Memindai...";
                statusEl.className = "";
                html5QrCode.resume();
            }, 1500);
        }
    </script>
</body>
</html>
