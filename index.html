<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keamanan & Absensi</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        h2 { color: #3c4043; margin-bottom: 5px; font-size: 22px; }
        p { color: #70757a; font-size: 14px; margin-bottom: 25px; }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; background: #000; }
        #status-box { margin-top: 25px; padding: 18px; border-radius: 14px; font-weight: 600; font-size: 15px; min-height: 20px; transition: all 0.3s ease; border: 1px solid #e0e0e0; }
        .waiting { background: #fdf4e3; color: #b06000; border-color: #ffe0b2; }
        .success { background: #e6f4ea; color: #137333; border-color: #ceead6; }
        .error { background: #fce8e6; color: #c5221f; border-color: #fad2cf; }
        .btn-start { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Terminal Pintu Masuk</h2>
        <p>Silakan pindai kartu Karyawan atau Visitor</p>
        
        <div id="reader"></div>
        <button id="start-btn" class="btn-start" onclick="initScanner()">AKTIFKAN SCANNER</button>
        
        <div id="status-box" id="status-text">Siap melayani...</div>
    </div>

    <script>
        const script_url = "PASTE_URL_WEB_APP_ANDA"; 
        let html5QrCode;

        function initScanner() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
        }

        function onScan(decodedText) {
            html5QrCode.pause(true);
            const box = document.getElementById('status-box');
            box.innerHTML = "Memverifikasi data...";
            box.className = "waiting";

            const script = document.createElement('script');
            script.src = script_url + "?id=" + encodeURIComponent(decodedText) + "&callback=onResult";
            document.body.appendChild(script);
        }

        window.onResult = function(msg) {
            const box = document.getElementById('status-box');
            box.innerHTML = msg;
            box.className = msg.includes("Berhasil") || msg.includes("Selamat") ? "success" : "error";

            setTimeout(() => {
                box.innerHTML = "Siap melayani...";
                box.className = "";
                html5QrCode.resume();
            }, 3500);
        };
    </script>
</body>
</html>
