<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Absensi Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #0052cc; --success: #36b37e; --error: #ff5630; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        #reader { width: 100%; border-radius: 1rem; overflow: hidden; background: #000; }
        #status { margin-top: 1.5rem; padding: 1rem; border-radius: 0.8rem; font-weight: 600; min-height: 20px; transition: 0.3s; border: 1px solid #dfe1e6; }
        .btn { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 0.8rem; font-weight: bold; cursor: pointer; margin-bottom: 1rem; font-size: 1rem; }
        .success { background: #e3fcef; color: var(--success); border-color: var(--success); }
        .error { background: #ffebe6; color: var(--error); border-color: var(--error); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0">Terminal Scan</h2>
        <div id="reader"></div>
        <button id="start-btn" class="btn" onclick="startScanner()">AKTIFKAN KAMERA</button>
        <div id="status">Siap memindai...</div>
    </div>

    <script>
        const API_URL = "URL_WEB_APP_ANDA"; // GANTI DENGAN URL DEPLOY ANDA
        let scanner;

        function startScanner() {
            document.getElementById('start-btn').style.display = 'none';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
        }

        function onScan(decodedText) {
            scanner.pause(true);
            const statusBox = document.getElementById('status');
            statusBox.innerHTML = "Memverifikasi ID: " + decodedText;
            statusBox.className = "";

            const script = document.createElement('script');
            script.src = `${API_URL}?id=${encodeURIComponent(decodedText)}&callback=onResult`;
            document.body.appendChild(script);
        }

        window.onResult = function(response) {
            const statusBox = document.getElementById('status');
            statusBox.innerHTML = response;
            statusBox.className = response.includes("✅") ? "success" : "error";

            setTimeout(() => {
                statusBox.innerHTML = "Siap memindai...";
                statusBox.className = "";
                scanner.resume();
            }, 3000);
        };
    </script>
</body>
</html>
